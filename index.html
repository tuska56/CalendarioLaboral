// Utilidades
const calcularHoras = (inicio, fin) => {
  if (!inicio || !fin) return 0;
  const [h1, m1] = inicio.split(':').map(Number);
  const [h2, m2] = fin.split(':').map(Number);
  return ((h2 * 60 + m2) - (h1 * 60 + m1)) / 60;
};

const calcularHorasSemanales = (horario) => {
  let total = 0;
  ['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'].forEach(dia => {
    if (horario[dia]?.activo) total += calcularHoras(horario[dia].inicio, horario[dia].fin);
  });
  return Math.round(total * 100) / 100;
};

const calcularHorasDia = (fecha, horario) => {
  const diaSemana = new Date(fecha + 'T12:00:00').getDay();
  const dias = ['domingo', 'lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'];
  const nombreDia = dias[diaSemana];
  if (!horario || !horario[nombreDia] || !horario[nombreDia].activo) return 0;
  return calcularHoras(horario[nombreDia].inicio, horario[nombreDia].fin);
};

const useMultiYear = (key, initialValue) => {

};

// MOTOR DE CÁLCULO CORREGIDO
const MotorCalculo = {
  calcularHorasAnuales: (empleado, convenio, eventos, festivos, horarios, simular = false) => {
    const anio = convenio.anio;
    let horasRealesTrabajadas = 0;
    let horasVacaciones = 0;
    let horasFestivos = 0;
    const horasTeoricas = convenio.horas_anuales;
    
    const obtenerHorario = (fecha) => {
      return horarios
        .filter(h => h.empleado_id === empleado.id)
        .sort((a, b) => new Date(b.fecha_inicio) - new Date(a.fecha_inicio))
        .find(h => {
          const fechaDate = new Date(fecha + 'T12:00:00');
          const inicio = new Date(h.fecha_inicio + 'T12:00:00');
          const fin = h.fecha_fin ? new Date(h.fecha_fin + 'T12:00:00') : new Date('2099-12-31');
          return fechaDate >= inicio && fechaDate <= fin;
        });
    };
    
    for (let mes = 0; mes < 12; mes++) {
      const diasMes = new Date(anio, mes + 1, 0).getDate();
      for (let dia = 1; dia <= diasMes; dia++) {
        const fecha = `${anio}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
        const diaSemana = new Date(fecha + 'T12:00:00').getDay();
        
        // DOMINGOS NUNCA CUENTAN
        if (diaSemana === 0) continue;
        
        const horario = obtenerHorario(fecha);
        if (!horario) continue;
        
        const horasDia = calcularHorasDia(fecha, horario);
        
        const eventoDelDia = eventos.find(e => 
          e.empleado_id === empleado.id && 
          fecha >= e.fecha_inicio && 
          fecha <= e.fecha_fin
        );
        
        const festivoDelDia = festivos.find(f => f.fecha === fecha);
        
        // Lógica según tipo de día
        if (eventoDelDia) {
          if (simular && ['VACACIONES', 'ASUNTOS_PROPIOS', 'SABADO_LIBRE'].includes(eventoDelDia.tipo_evento)) {
            // En simulación, contar como trabajadas
            horasRealesTrabajadas += horasDia;
          } else {
            switch (eventoDelDia.tipo_evento) {
              case 'VACACIONES':
              case 'ASUNTOS_PROPIOS':
              case 'SABADO_LIBRE':
                horasVacaciones += horasDia; // Horas NO trabajadas
                break;
              case 'FALTA_HORAS':
                horasRealesTrabajadas -= eventoDelDia.horas || 0;
                break;
              case 'HORAS_EXTRA':
                horasRealesTrabajadas += eventoDelDia.horas || 0;
                break;
              case 'FESTIVO_TRABAJADO':
                horasRealesTrabajadas += horasDia;
                break;
            }
          }
        } else if (festivoDelDia) {
          if (festivoDelDia.medio_dia) {
            horasRealesTrabajadas += horasDia / 2;
            horasFestivos += horasDia / 2;
          } else {
            horasFestivos += horasDia;
          }
        } else {
          // Día normal trabajado
          horasRealesTrabajadas += horasDia;
        }
      }
    }
    
    const saldo = horasRealesTrabajadas - horasTeoricas;
    
    return {
      horasTeoricas: Math.round(horasTeoricas * 100) / 100,
      horasRealesTrabajadas: Math.round(horasRealesTrabajadas * 100) / 100,
      horasVacaciones: Math.round(horasVacaciones * 100) / 100,
      horasFestivos: Math.round(horasFestivos * 100) / 100,
      saldo: Math.round(saldo * 100) / 100
    };
  },
  
  calcularVacaciones: (empleado, convenio, eventos) => {
    const vacacionesUsadas = eventos.filter(e => 
      e.empleado_id === empleado.id && 
      e.tipo_evento === 'VACACIONES'
    ).reduce((total, e) => {
      const inicio = new Date(e.fecha_inicio + 'T12:00:00');
      const fin = new Date(e.fecha_fin + 'T12:00:00');
      const dias = Math.round((fin - inicio) / (1000 * 60 * 60 * 24)) + 1;
      return total + dias;
    }, 0);
    
    return {
      total: convenio.dias_vacaciones,
      usadas: vacacionesUsadas,
      disponibles: convenio.dias_vacaciones - vacacionesUsadas
    };
  },
  
  calcularAsuntosPropios: (empleado, convenio, eventos) => {
    const asuntosUsados = eventos.filter(e => 
      e.empleado_id === empleado.id && 
      e.tipo_evento === 'ASUNTOS_PROPIOS'
    ).reduce((total, e) => {
      const inicio = new Date(e.fecha_inicio + 'T12:00:00');
      const fin = new Date(e.fecha_fin + 'T12:00:00');
      const dias = Math.round((fin - inicio) / (1000 * 60 * 60 * 24)) + 1;
      return total + dias;
    }, 0);
    
    return {
      total: convenio.dias_asuntos_propios,
      usados: asuntosUsados,
      disponibles: convenio.dias_asuntos_propios - asuntosUsados
    };
  },
  
  // CÁLCULO CORRECTO: (Horas totales posibles - Vacaciones - Festivos) - Convenio
  calcularSabadosLibres: (empleado, convenio, eventos, festivos, horarios) => {
    const anio = convenio.anio;
    
    const obtenerHorario = (fecha) => {
      return horarios
        .filter(h => h.empleado_id === empleado.id)
        .sort((a, b) => new Date(b.fecha_inicio) - new Date(a.fecha_inicio))
        .find(h => {
          const fechaDate = new Date(fecha + 'T12:00:00');
          const inicio = new Date(h.fecha_inicio + 'T12:00:00');
          const fin = h.fecha_fin ? new Date(h.fecha_fin + 'T12:00:00') : new Date('2099-12-31');
          return fechaDate >= inicio && fechaDate <= fin;
        });
    };
    
    // 1. Calcular TODAS las horas laborables posibles del año (sin eventos)
    let horasTotalesPosibles = 0;
    let horasVacaciones = 0;
    let horasFestivos = 0;
    let horasFaltas = 0;
    let horasExtra = 0;
    let totalHorasSabado = 0;
    let cantidadSabados = 0;
    
    for (let mes = 0; mes < 12; mes++) {
      const diasMes = new Date(anio, mes + 1, 0).getDate();
      for (let dia = 1; dia <= diasMes; dia++) {
        const fecha = `${anio}-${String(mes + 1).padStart(2, '0')}-${String(dia).padStart(2, '0')}`;
        const diaSemana = new Date(fecha + 'T12:00:00').getDay();
        
        if (diaSemana === 0) continue; // Ignorar domingos
        
        const horario = obtenerHorario(fecha);
        if (!horario) continue;
        
        const horasDia = calcularHorasDia(fecha, horario);
        
        // Sumar a horas totales posibles
        horasTotalesPosibles += horasDia;
        
        // Contar sábados
        if (diaSemana === 6) {
          cantidadSabados++;
          totalHorasSabado += horasDia;
        }
        
        // Identificar qué tipo de día es
        const eventoDelDia = eventos.find(e => 
          e.empleado_id === empleado.id && 
          fecha >= e.fecha_inicio && 
          fecha <= e.fecha_fin
        );
        
        const festivoDelDia = festivos.find(f => f.fecha === fecha);
        
        // Contabilizar según el tipo
        if (eventoDelDia) {
          switch (eventoDelDia.tipo_evento) {
            case 'VACACIONES':
            case 'ASUNTOS_PROPIOS':
            case 'SABADO_LIBRE':
              horasVacaciones += horasDia;
              break;
            case 'FALTA_HORAS':
              horasFaltas += eventoDelDia.horas || 0;
              break;
            case 'HORAS_EXTRA':
              horasExtra += eventoDelDia.horas || 0;
              break;
            case 'FESTIVO_TRABAJADO':
              // Si trabaja un festivo, no resta de las horas posibles
              break;
          }
        } else if (festivoDelDia) {
          if (festivoDelDia.medio_dia) {
            horasFestivos += horasDia / 2;
          } else {
            horasFestivos += horasDia;
          }
        }
      }
    }
    
    const horasPromedioPorSabado = cantidadSabados > 0 ? totalHorasSabado / cantidadSabados : 0;
    
    // 2. Calcular horas netas disponibles
    // Horas netas = Todas las posibles - Vacaciones - Festivos - Faltas + Extra
    const horasNetas = horasTotalesPosibles - horasVacaciones - horasFestivos - horasFaltas + horasExtra;
    
    // 3. Saldo respecto al convenio
    const saldoHoras = horasNetas - convenio.horas_anuales;
    
    // 4. Sábados disponibles por saldo positivo
    const sabadosPorSaldo = saldoHoras > 0 && horasPromedioPorSabado > 0
      ? Math.floor(saldoHoras / horasPromedioPorSabado)
      : 0;
    
    // 5. Sábados ya usados
    const sabadosUsados = eventos.filter(e => 
      e.empleado_id === empleado.id && 
      e.tipo_evento === 'SABADO_LIBRE'
    ).reduce((total, e) => {
      const inicio = new Date(e.fecha_inicio + 'T12:00:00');
      const fin = new Date(e.fecha_fin + 'T12:00:00');
      let count = 0;
      for (let d = new Date(inicio); d <= fin; d.setDate(d.getDate() + 1)) {
        if (d.getDay() === 6) count++;
      }
      return total + count;
    }, 0);
    
    // 6. Disponibles = Por saldo - Usados
    const disponibles = Math.max(0, sabadosPorSaldo - sabadosUsados);
    
    return {
      porSaldo: sabadosPorSaldo,
      disponibles: disponibles,
      usados: sabadosUsados,
      saldoHoras: Math.round(saldoHoras * 100) / 100,
      horasPorSabado: Math.round(horasPromedioPorSabado * 100) / 100,
      horasTotales: Math.round(horasTotalesPosibles * 100) / 100,
      horasVacaciones: Math.round(horasVacaciones * 100) / 100,
      horasFestivos: Math.round(horasFestivos * 100) / 100,
      horasNetas: Math.round(horasNetas * 100) / 100
    };
  }
};

// Componente Calendario Anual
const CalendarioAnual = ({ anio, empleado, eventos, festivos, guardias }) => {
  const obtenerEventosDia = (fecha) => {
    const eventos_dia = [];
    
    // Eventos del empleado
    const evento = eventos.find(e => 
      e.empleado_id === empleado.id && 
      fecha >= e.fecha_inicio && 
      fecha <= e.fecha_fin
    );
    if (evento) eventos_dia.push({ tipo: 'evento', data: evento });
    
    // Festivos
    const festivo = festivos.find(f => f.fecha === fecha);
    if (festivo) eventos_dia.push({ tipo: 'festivo', data: festivo });
    
    // Guardias
    const guardia = guardias.find(g => g.empleado_id === empleado.id && g.fecha === fecha);
    if (guardia) eventos_dia.push({ tipo: 'guardia', data: guardia });
    
    return eventos_dia;
  };
  
  return (
    <div className="space-y-4">
      <h3 className="font-bold text-gray-900">Calendario Anual {anio}</h3>
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {[...Array(12)].map((_, mesIdx) => {
          const primerDia = new Date(anio, mesIdx, 1);
          const ultimoDia = new Date(anio, mesIdx + 1, 0);
          const diasMes = ultimoDia.getDate();
          const primerDiaSemana = primerDia.getDay();
          
          return (
            <div key={mesIdx} className="border rounded-lg p-3">
              <h4 className="font-semibold text-center mb-2">{MESES[mesIdx]}</h4>
              <div className="grid grid-cols-7 gap-1">
                {DIAS_SEMANA.map(d => (
                  <div key={d} className="text-xs font-bold text-center text-gray-600">{d}</div>
                ))}
                {[...Array(primerDiaSemana)].map((_, i) => <div key={`empty-${i}`} />)}
                {[...Array(diasMes)].map((_, dia) => {
                  const fecha = `${anio}-${String(mesIdx + 1).padStart(2, '0')}-${String(dia + 1).padStart(2, '0')}`;
                  const diaSemana = new Date(fecha + 'T12:00:00').getDay();
                  const eventosDia = obtenerEventosDia(fecha);
                  
                  let bgColor = 'bg-white';
                  let letra = '';
                  
                  if (diaSemana === 0) bgColor = 'bg-gray-100';
                  
                  eventosDia.forEach(ev => {
                    if (ev.tipo === 'evento') {
                      bgColor = TIPOS_EVENTO[ev.data.tipo_evento].bgLight;
                      letra = TIPOS_EVENTO[ev.data.tipo_evento].letra;
                    } else if (ev.tipo === 'festivo') {
                      bgColor = 'bg-yellow-100';
                      letra = ev.data.medio_dia ? 'F½' : 'F';
                    } else if (ev.tipo === 'guardia') {
                      letra = letra ? letra + ',G' : 'G';
                    }
                  });
                  
                  return (
                    <div key={dia} className={`h-8 ${bgColor} rounded flex flex-col items-center justify-center text-xs relative`}>
                      <span className="font-semibold">{dia + 1}</span>
                      {letra && <span className="text-[8px] font-bold absolute bottom-0">{letra}</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
      <div className="flex flex-wrap gap-4 text-xs">
        <div className="flex items-center gap-2"><div className="w-4 h-4 bg-blue-100 rounded"></div><span>V - Vacaciones</span></div>
        <div className="flex items-center gap-2"><div className="w-4 h-4 bg-purple-100 rounded"></div><span>A - Asuntos Propios</span></div>
        <div className="flex items-center gap-2"><div className="w-4 h-4 bg-teal-100 rounded"></div><span>SL - Sábado Libre</span></div>
        <div className="flex items-center gap-2"><div className="w-4 h-4 bg-red-100 rounded"></div><span>F - Falta</span></div>
        <div className="flex items-center gap-2"><div className="w-4 h-4 bg-green-100 rounded"></div><span>+ - Horas Extra</span></div>
        <div className="flex items-center gap-2"><div className="w-4 h-4 bg-yellow-100 rounded"></div><span>F - Festivo</span></div>
        <div className="flex items-center gap-2"><div className="w-4 h-4 bg-pink-100 rounded"></div><span>G - Guardia</span></div>
      </div>
    </div>
  );
};

  const [mesActual, setMesActual] = useState(new Date().getMonth());
  
  const obtenerEventosDia = (fecha) => {
    const eventos_dia = [];
    
    empleados.forEach(emp => {
      const evento = eventos.find(e => 
        e.empleado_id === emp.id && 
        ['VACACIONES', 'ASUNTOS_PROPIOS', 'SABADO_LIBRE'].includes(e.tipo_evento) &&
        fecha >= e.fecha_inicio && 
        fecha <= e.fecha_fin
      );
      if (evento) {
        eventos_dia.push({
          empleado: emp.nombre,
          letra: TIPOS_EVENTO[evento.tipo_evento].letra,
          color: TIPOS_EVENTO[evento.tipo_evento].bgLight
        });
      }
    });
    
    const festivo = festivos.find(f => f.fecha === fecha);
    if (festivo) {
      eventos_dia.push({
        empleado: festivo.descripcion,
        letra: festivo.medio_dia ? 'F½' : 'F',
        color: 'bg-yellow-100'
      });
    }
    
    return eventos_dia;
  };
  
  const primerDia = new Date(anio, mesActual, 1);
  const ultimoDia = new Date(anio, mesActual + 1, 0);
  const diasMes = ultimoDia.getDate();
  const primerDiaSemana = primerDia.getDay();
  
  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h3 className="font-bold text-gray-900">Calendario Global - {MESES[mesActual]} {anio}</h3>
        <div className="flex gap-2">
          <button onClick={() => setMesActual((mesActual - 1 + 12) % 12)} className="p-2 hover:bg-gray-100 rounded">
            <ChevronLeft size={20} />
          </button>
          <button onClick={() => setMesActual((mesActual + 1) % 12)} className="p-2 hover:bg-gray-100 rounded">
            <ChevronRight size={20} />
          </button>
        </div>
      </div>
      
      <div className="grid grid-cols-7 gap-2">
        {DIAS_SEMANA.map(d => (
          <div key={d} className="text-sm font-bold text-center text-gray-600 p-2">{d}</div>
        ))}
        {[...Array(primerDiaSemana)].map((_, i) => <div key={`empty-${i}`} className="h-24" />)}
        {[...Array(diasMes)].map((_, dia) => {
          const fecha = `${anio}-${String(mesActual + 1).padStart(2, '0')}-${String(dia + 1).padStart(2, '0')}`;
          const diaSemana = new Date(fecha + 'T12:00:00').getDay();
          const eventosDia = obtenerEventosDia(fecha);
          
          return (
            <div key={dia} className={`h-24 border rounded-lg p-2 ${diaSemana === 0 ? 'bg-gray-50' : 'bg-white'} overflow-y-auto`}>
              <div className="font-semibold text-sm mb-1">{dia + 1}</div>
              <div className="space-y-1">
                {eventosDia.map((ev, idx) => (
                  <div key={idx} className={`text-[10px] ${ev.color} rounded px-1`}>
                    {ev.empleado} - {ev.letra}
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

                      <span className="text-blue-600">Vac: {stat.vacaciones.disponibles}/{stat.vacaciones.total}</span>
                      <span className="text-teal-600">Sáb: {stat.sabados.disponibles}</span>
                      <span className={stat.horas.saldo >= 0 ? 'text-green-600' : 'text-red-600'}>Saldo: {stat.horas.saldo > 0 ? '+' : ''}{stat.horas.saldo}h</span>
                    </div>
                  )}
                </div>
                <Button variant="secondary" size="sm" onClick={() => { setEmpleadoSeleccionado(emp); setVista('empleado'); }}>Detalles</Button>
              </div>
              <div className="border-t pt-4">
                <div className="flex items-center justify-between mb-2">
                  <h4 className="font-semibold text-gray-900">Horarios</h4>
                  <Button icon={Plus} size="sm" variant="secondary" onClick={() => { setEmpleadoSeleccionado(emp); setEditandoHorario(null); setModalHorario(true); }}>Añadir</Button>
                </div>
                {horarios.filter(h => h.empleado_id === emp.id).map(h => (
                  <div key={h.id} className="p-3 bg-gray-50 rounded-lg mb-2">
                    <p className="font-medium text-sm">{h.descripcion}</p>
                    <p className="text-xs text-gray-500">{h.fecha_inicio} → {h.fecha_fin || 'Indefinido'} - {calcularHorasSemanales(h)}h/sem</p>
                  </div>
                ))}
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
  
  const VistaEmpleado = () => {
    if (!empleadoSeleccionado) return null;
    const stat = estadisticas.empleados.find(e => e.empleado.id === empleadoSeleccionado.id);
    if (!stat) return null;
    
    return (
      <div className="space-y-6">
        <div className="flex items-center gap-4">
          <Button variant="ghost" icon={ChevronLeft} onClick={() => setVista('dashboard')}>Volver</Button>
          <h1 className="text-3xl font-bold text-gray-900">{empleadoSeleccionado.nombre}</h1>
        </div>
        
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
          <Card className="p-6">
            <p className="text-sm text-gray-500 mb-1">Vacaciones</p>
            <p className="text-2xl font-bold text-blue-600">{stat.vacaciones.disponibles}/{stat.vacaciones.total}</p>
          </Card>
          <Card className="p-6">
            <p className="text-sm text-gray-500 mb-1">Asuntos Propios</p>
            <p className="text-2xl font-bold text-purple-600">{stat.asuntos.disponibles}/{stat.asuntos.total}</p>
          </Card>
          <Card className="p-6">
            <p className="text-sm text-gray-500 mb-1">Sábados Libres</p>
            <p className="text-2xl font-bold text-teal-600">{stat.sabados.disponibles}</p>
            <p className="text-xs text-gray-500 mt-1">
              Por saldo: {stat.sabados.porSaldo} | Usados: {stat.sabados.usados}
            </p>
            <p className="text-xs text-gray-500">
              Saldo: {stat.sabados.saldoHoras > 0 ? '+' : ''}{stat.sabados.saldoHoras}h ({stat.sabados.horasPorSabado}h/sáb)
            </p>
          </Card>
          <Card className="p-6">
            <p className="text-sm text-gray-500 mb-1">Saldo Horas</p>
            <p className={`text-2xl font-bold ${stat.horas.saldo >= 0 ? 'text-green-600' : 'text-red-600'}`}>
              {stat.horas.saldo > 0 ? '+' : ''}{stat.horas.saldo}h
            </p>
          </Card>
        </div>
        
        <div className="flex gap-2 items-center">
          <Button icon={Plus} onClick={() => setModalEvento(true)}>Añadir Evento</Button>
          <Checkbox label="Simulación (sin vacaciones)" checked={modoSimulacion} onChange={setModoSimulacion} />
        </div>
        
        <Card className="p-6">
          <CalendarioAnual anio={anioActual} empleado={empleadoSeleccionado} eventos={eventos} festivos={festivos} guardias={guardias} />
        </Card>
        
        <Card className="p-6">
          <h2 className="text-xl font-bold text-gray-900 mb-4">Eventos</h2>
          <div className="space-y-2">
            {eventos.filter(e => e.empleado_id === empleadoSeleccionado.id).map(ev => (
              <div key={ev.id} className="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                <div className="flex items-center gap-3">
                  <div className={`w-3 h-3 rounded-full ${TIPOS_EVENTO[ev.tipo_evento].color}`}></div>
                  <div>
                    <p className="font-medium text-gray-900">{TIPOS_EVENTO[ev.tipo_evento].label}</p>
                    <p className="text-sm text-gray-500">{ev.fecha_inicio} → {ev.fecha_fin}</p>
                  </div>
                </div>
                <Button variant="ghost" icon={Trash2} size="sm" onClick={() => setEventos(eventos.filter(e => e.id !== ev.id))} className="!p-2" />
              </div>
            ))}
          </div>
        </Card>
      </div>
    );
  };
  
  const VistaConfiguracion = () => (
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <h1 className="text-3xl font-bold text-gray-900">Configuración</h1>
        <div className="flex gap-3">
          <Select value={anioActual} onChange={(v) => cambiarAnio(parseInt(v))} options={[2024, 2025, 2026].map(a => ({ value: a, label: `Año ${a}` }))} />
          <Button icon={RefreshCw} variant="secondary" onClick={() => {
            if (confirm('¿Recargar festivos?')) {
              const fps = FESTIVOS_POR_ANIO[anioActual] || [];
              const manuales = festivos.filter(f => f.ambito === 'MANUAL');
              setFestivos([...fps.map((f, i) => ({ ...f, id: Date.now() + i })), ...manuales]);
            }
          }}>Actualizar Festivos</Button>
        </div>
      </div>
      
      <Card className="p-6">
        <h2 className="text-xl font-bold text-gray-900 mb-4">Convenio {anioActual}</h2>
        <div className="grid grid-cols-3 gap-4">
          <Input label="Horas Anuales" type="number" value={convenio.horas_anuales} onChange={(v) => setConvenio({...convenio, horas_anuales: parseFloat(v)})} />
          <Input label="Días Vacaciones" type="number" value={convenio.dias_vacaciones} onChange={(v) => setConvenio({...convenio, dias_vacaciones: parseInt(v)})} />
          <Input label="Días Asuntos Propios" type="number" value={convenio.dias_asuntos_propios} onChange={(v) => setConvenio({...convenio, dias_asuntos_propios: parseInt(v)})} />
        </div>
      </Card>
      
      <Card className="p-6">
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-xl font-bold text-gray-900">Traspaso Horas</h2>
          <Button icon={Plus} size="sm" onClick={() => setModalTraspaso(true)}>Traspasar</Button>
        </div>
        <p className="text-sm text-gray-600">Permite traspasar horas no consumidas entre años</p>
      </Card>
      
      <Card className="p-6">
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-xl font-bold text-gray-900">Guardias</h2>
          <Button icon={Plus} size="sm" onClick={() => { setEditandoGuardia(null); setFormGuardia({ empleado_id: '', fecha: '', tipo: '', observaciones: '' }); setModalGuardia(true); }}>Añadir</Button>
        </div>
        <div className="space-y-2">
          {guardias.map(g => {
            const emp = empleados.find(e => e.id === g.empleado_id);
            return (
              <div key={g.id} className="p-3 bg-gray-50 rounded-lg flex items-center justify-between">
                <div>
                  <p className="font-medium">{emp?.nombre} - {g.tipo}</p>
                  <p className="text-sm text-gray-500">{g.fecha}</p>
                </div>
                <Button variant="ghost" icon={Trash2} size="sm" onClick={() => setGuardias(guardias.filter(gg => gg.id !== g.id))} className="!p-2" />
              </div>
            );
          })}
        </div>
      </Card>
      
      <Card className="p-6">
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-xl font-bold text-gray-900">Festivos</h2>
          <Button icon={Plus} size="sm" onClick={() => { setEditandoFestivo(null); setFormFestivo({ fecha: '', descripcion: '', ambito: 'MANUAL', medio_dia: false }); setModalFestivo(true); }}>Añadir</Button>
        </div>
        <div className="space-y-1">
          {festivos.sort((a, b) => new Date(a.fecha) - new Date(b.fecha)).map(f => (
            <div key={f.id} className="flex items-center justify-between p-2 bg-gray-50 rounded">
              <div>
                <span className="font-medium text-sm">{f.descripcion}</span>
                <span className="text-xs text-gray-500 ml-2">{f.fecha}</span>
                {f.medio_dia && <span className="text-xs text-orange-600 ml-2">(½)</span>}
              </div>
              <Button variant="ghost" icon={Trash2} size="sm" onClick={() => setFestivos(festivos.filter(ff => ff.id !== f.id))} className="!p-1" />
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
  
  return (
    <div className="min-h-screen bg-gradient-to-br from-emerald-50 via-teal-50 to-cyan-50">
      <div className="bg-white border-b shadow-sm sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="flex items-center justify-between h-16">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-lg flex items-center justify-center">
                <Calendar className="text-white" size={24} />
              </div>
              <span className="text-xl font-bold bg-gradient-to-r from-emerald-600 to-teal-600 bg-clip-text text-transparent">Farmacia Control</span>
            </div>
            <nav className="flex gap-2">
              {['dashboard', 'empleados', 'configuracion'].map(v => (
                <button key={v} onClick={() => setVista(v)} className={`px-4 py-2 rounded-lg font-medium transition-colors capitalize ${vista === v ? 'bg-emerald-100 text-emerald-700' : 'text-gray-600 hover:bg-gray-100'}`}>
                  {v === 'configuracion' ? 'Config' : v}
                </button>
              ))}
            </nav>
          </div>
        </div>
      </div>
      
      <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {vista === 'dashboard' && <VistaDashboard />}
        {vista === 'empleados' && <VistaEmpleados />}
        {vista === 'empleado' && <VistaEmpleado />}
        {vista === 'configuracion' && <VistaConfiguracion />}
      </div>
      
      {/* MODALES - igual que antes, omitidos por brevedad */}
      <Modal isOpen={modalEmpleado} onClose={() => setModalEmpleado(false)} title="Empleado">
        <div className="space-y-4">
          <Input label="Nombre" value={formEmpleado.nombre} onChange={(v) => setFormEmpleado({...formEmpleado, nombre: v})} required />
          <Input label="Fecha Alta" type="date" value={formEmpleado.fecha_alta} onChange={(v) => setFormEmpleado({...formEmpleado, fecha_alta: v})} required />
          <div className="flex gap-2 pt-4">
            <Button onClick={guardarEmpleado} icon={Save} className="flex-1">Guardar</Button>
            <Button variant="secondary" onClick={() => setModalEmpleado(false)}>Cancelar</Button>
          </div>
        </div>
      </Modal>
      
      <Modal isOpen={modalEvento} onClose={() => setModalEvento(false)} title="Evento">
        <div className="space-y-4">
          <Select label="Tipo" value={formEvento.tipo_evento} onChange={(v) => setFormEvento({...formEvento, tipo_evento: v})} options={Object.entries(TIPOS_EVENTO).map(([k, v]) => ({ value: k, label: v.label }))} />
          <Input label="Inicio" type="date" value={formEvento.fecha_inicio} onChange={(v) => setFormEvento({...formEvento, fecha_inicio: v})} required />
          <Input label="Fin" type="date" value={formEvento.fecha_fin} onChange={(v) => setFormEvento({...formEvento, fecha_fin: v})} required />
          {['FALTA_HORAS', 'HORAS_EXTRA'].includes(formEvento.tipo_evento) && (
            <Input label="Horas" type="number" value={formEvento.horas} onChange={(v) => setFormEvento({...formEvento, horas: v})} step="0.5" min="0" required />
          )}
          <div className="flex gap-2 pt-4">
            <Button onClick={guardarEvento} icon={Save} className="flex-1">Guardar</Button>
            <Button variant="secondary" onClick={() => setModalEvento(false)}>Cancelar</Button>
          </div>
        </div>
      </Modal>
      
      <Modal isOpen={modalHorario} onClose={() => setModalHorario(false)} title="Horario">
        <div className="space-y-4">
          <Input label="Descripción" value={formHorario.descripcion} onChange={(v) => setFormHorario({...formHorario, descripcion: v})} required />
          <Input label="Inicio" type="date" value={formHorario.fecha_inicio} onChange={(v) => setFormHorario({...formHorario, fecha_inicio: v})} required />
          <Input label="Fin" type="date" value={formHorario.fecha_fin} onChange={(v) => setFormHorario({...formHorario, fecha_fin: v})} />
          <div className="border-t pt-4">
            <h3 className="font-bold mb-3">Semanal</h3>
            {['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'].map((dia, idx) => (
              <div key={dia} className="space-y-2 mb-3">
                <Checkbox label={DIAS_SEMANA_COMPLETO[idx + 1]} checked={formHorario[dia].activo} onChange={(checked) => setFormHorario({ ...formHorario, [dia]: { ...formHorario[dia], activo: checked } })} />
                {formHorario[dia].activo && (
                  <div className="grid grid-cols-2 gap-2 ml-6">
                    <Input type="time" value={formHorario[dia].inicio} onChange={(v) => setFormHorario({ ...formHorario, [dia]: { ...formHorario[dia], inicio: v } })} />
                    <Input type="time" value={formHorario[dia].fin} onChange={(v) => setFormHorario({ ...formHorario, [dia]: { ...formHorario[dia], fin: v } })} />
                  </div>
                )}
              </div>
            ))}
            <div className="mt-4 p-3 bg-emerald-50 rounded-lg">
              <p className="text-sm font-medium text-emerald-900">Total: {calcularHorasSemanales(formHorario)}h/sem</p>
            </div>
          </div>
          <div className="flex gap-2 pt-4">
            <Button onClick={guardarHorario} icon={Save} className="flex-1">Guardar</Button>
            <Button variant="secondary" onClick={() => setModalHorario(false)}>Cancelar</Button>
          </div>
        </div>
      </Modal>
      
      <Modal isOpen={modalGuardia} onClose={() => setModalGuardia(false)} title="Guardia">
        <div className="space-y-4">
          <Select label="Empleado" value={formGuardia.empleado_id} onChange={(v) => setFormGuardia({...formGuardia, empleado_id: v})} options={[{ value: '', label: 'Seleccionar' }, ...empleados.map(e => ({ value: e.id.toString(), label: e.nombre }))]} required />
          <Input label="Fecha" type="date" value={formGuardia.fecha} onChange={(v) => setFormGuardia({...formGuardia, fecha: v})} required />
          <Input label="Tipo" value={formGuardia.tipo} onChange={(v) => setFormGuardia({...formGuardia, tipo: v})} placeholder="Mañana/Tarde/24h" required />
          <Input label="Observaciones" value={formGuardia.observaciones} onChange={(v) => setFormGuardia({...formGuardia, observaciones: v})} />
          <div className="flex gap-2 pt-4">
            <Button onClick={guardarGuardia} icon={Save} className="flex-1">Guardar</Button>
            <Button variant="secondary" onClick={() => setModalGuardia(false)}>Cancelar</Button>
          </div>
        </div>
      </Modal>
      
      <Modal isOpen={modalFestivo} onClose={() => setModalFestivo(false)} title="Festivo">
        <div className="space-y-4">
          <Input label="Fecha" type="date" value={formFestivo.fecha} onChange={(v) => setFormFestivo({...formFestivo, fecha: v})} required />
          <Input label="Descripción" value={formFestivo.descripcion} onChange={(v) => setFormFestivo({...formFestivo, descripcion: v})} required />
          <Select label="Ámbito" value={formFestivo.ambito} onChange={(v) => setFormFestivo({...formFestivo, ambito: v})} options={[
            { value: 'MANUAL', label: 'Manual' },
            { value: 'LOCAL', label: 'Local' },
            { value: 'AUTONOMICO', label: 'Autonómico' },
            { value: 'NACIONAL', label: 'Nacional' },
            { value: 'CONVENIO', label: 'Convenio' }
          ]} />
          <Checkbox label="Medio día" checked={formFestivo.medio_dia} onChange={(checked) => setFormFestivo({...formFestivo, medio_dia: checked})} />
          <div className="flex gap-2 pt-4">
            <Button onClick={guardarFestivo} icon={Save} className="flex-1">Guardar</Button>
            <Button variant="secondary" onClick={() => setModalFestivo(false)}>Cancelar</Button>
          </div>
        </div>
      </Modal>
      
      <Modal isOpen={modalTraspaso} onClose={() => setModalTraspaso(false)} title="Traspasar Horas">
        <div className="space-y-4">
          <Select label="Empleado" value={formTraspaso.empleado_id} onChange={(v) => setFormTraspaso({...formTraspaso, empleado_id: v})} options={[{ value: '', label: 'Seleccionar' }, ...empleados.map(e => ({ value: e.id.toString(), label: e.nombre }))]} required />
          <Input label="Horas" type="number" value={formTraspaso.horas} onChange={(v) => setFormTraspaso({...formTraspaso, horas: v})} step="0.5" required />
          <div className="p-3 bg-blue-50 rounded-lg">
            <p className="text-sm text-blue-900">Las horas se sumarán al convenio del siguiente año</p>
          </div>
          <div className="flex gap-2 pt-4">
            <Button onClick={traspasarHoras} icon={Save} className="flex-1">Traspasar</Button>
            <Button variant="secondary" onClick={() => setModalTraspaso(false)}>Cancelar</Button>
          </div>
        </div>
      </Modal>
    </div>
  );

// Renderizar la aplicación
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(FarmaciaControl));
    </script>
</body>
</html>
