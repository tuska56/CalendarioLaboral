@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap';);
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pr:#1239AD;--pl:#EEF1FB;--se:#99B9AF;--bg:#f4f6fc;--bg2:#eef1f8;--bd:#e8ecf4;--tx:#111827;--t2:#6b7280;--t3:#9ca3af;--re:#ef4444;--sh:0 1px 3px rgba(0,0,0,.06)}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,var(--bg),var(--bg2));min-height:100vh;color:var(--tx);font-size:14px}
.hdr{background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.hi{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px}
.lg{display:flex;align-items:center;gap:10px}
.li{width:34px;height:34px;border-radius:8px;background:var(--pr);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px}
.lt{font-size:16px;font-weight:700;color:var(--pr)}
nav{display:flex;gap:2px;align-items:center}
.nb{padding:6px 14px;border-radius:10px;font-size:13px;font-weight:500;border:none;cursor:pointer;background:transparent;color:var(--t2);transition:all .15s;font-family:inherit}
.nb:hover{background:#f3f4f6;color:var(--tx)}.nb.on{background:var(--pr);color:#fff}
.main{max-width:1200px;margin:0 auto;padding:24px 20px}
.card{background:#fff;border-radius:18px;border:1px solid var(--bd);box-shadow:var(--sh);overflow:hidden}
.cp{padding:20px}.ch{padding:18px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.ct{font-size:16px;font-weight:700}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.pt{font-size:22px;font-weight:700;letter-spacing:-.4px}.ps{font-size:12px;color:var(--t3);margin-top:2px}
.pa{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:12px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all .15s;font-family:inherit}
.bp{background:var(--pr);color:#fff}.bp:hover{background:#0f2d8a}
.bo{background:#fff;color:var(--tx);border:1px solid var(--bd)}.bo:hover{background:#f9fafb}
.bs{padding:5px 10px;font-size:12px;border-radius:8px}
.bi{padding:6px;border-radius:8px;border:none;background:transparent;cursor:pointer;color:var(--t3);font-family:inherit;font-size:16px;line-height:1;display:inline-flex;align-items:center}
.bi:hover{background:#f3f4f6;color:var(--t2)}.bi.d:hover{background:#fef2f2;color:var(--re)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.g4,.g3,.g2{grid-template-columns:1fr}}
.sc{background:#fff;border-radius:18px;border:1px solid var(--bd);box-shadow:var(--sh);padding:18px;cursor:pointer;transition:border-color .15s}
.sc:hover{border-color:#c7d2f0}.scl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.scn{font-size:28px;font-weight:700;line-height:1.1;margin-top:8px}.sch{font-size:11px;color:var(--t3);margin-top:2px}
.smr{display:flex;justify-content:space-between;font-size:12px;margin-top:6px}
.er{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #f9fafb;cursor:pointer;transition:background .1s}
.er:last-child{border-bottom:none}.er:hover{background:#fafbfd}
.av{width:38px;height:38px;border-radius:50%;background:var(--pr);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.calh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.calm{font-size:17px;font-weight:700}
.calg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.caldn{font-size:11px;font-weight:600;color:var(--t3);text-align:center;padding-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.calc{min-height:76px;border:1px solid var(--bd);border-radius:10px;padding:6px;background:rgba(255,255,255,.7);overflow:hidden;cursor:pointer}
.calc:hover{border-color:#c7d2f0}.calc.sun{background:rgba(249,250,251,.8)}.calc.emp{background:transparent;border:none;cursor:default}
.calcn{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:3px}
.cev{font-size:9px;border-radius:4px;padding:1px 4px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eV{background:#dbeafe;color:#1e40af}.eA{background:#ede9fe;color:#6d28d9}.eSL{background:#cffafe;color:#0e7490}
.eFT{background:#ffedd5;color:#c2410c}.eF{background:#fef3c7;color:#92400e}
.ag{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:900px){.ag{grid-template-columns:repeat(2,1fr)}}
.amt{font-size:11px;font-weight:700;color:var(--pr);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.amg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.adn{font-size:8px;font-weight:600;color:var(--t3);text-align:center;padding-bottom:2px}
.ad{height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;cursor:pointer;transition:background .1s}
.ad:hover{background:var(--pl)}.ad.sun{color:var(--t3)}.ad.fest{background:#fef3c7!important;color:#92400e!important;font-weight:700}
.ad.guard{box-shadow:inset 0 0 0 2px var(--se)}.ad.today{box-shadow:inset 0 0 0 2px var(--pr);color:var(--pr);font-weight:700}
.fg{margin-bottom:14px}.fl{font-size:13px;font-weight:500;color:var(--t2);display:block;margin-bottom:5px}
.fh{font-size:11px;color:var(--t3);margin-top:3px}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--bd);border-radius:10px;font-size:13px;font-family:inherit;color:var(--tx);background:#fff;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--pr)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.fr{grid-template-columns:1fr}}
.tgl{width:36px;height:20px;border-radius:10px;background:var(--bd);position:relative;transition:background .2s;flex-shrink:0;cursor:pointer;display:inline-block}
.tgl.on{background:var(--pr)}.tgl::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl.on::after{transform:translateX(16px)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.mbox{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.15);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;transform:translateY(16px);transition:transform .2s}
.mo.open .mbox{transform:none}
.mhdr{padding:20px 20px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mtx{font-size:16px;font-weight:700}.mbdy{padding:20px}.mft{padding:0 20px 20px;display:flex;gap:8px}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.legi{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.sp{color:#059669}.sn{color:var(--re)}
.tc{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.tst{padding:10px 16px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.08);display:flex;align-items:center;gap:8px;max-width:320px;animation:sli .25s ease}
.tst.ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.tst.er{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5}
.tst.in{background:var(--pl);color:var(--pr);border:1px solid #c7d2f0}
@keyframes sli{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
.empty{padding:36px 20px;text-align:center;color:var(--t3);font-size:13px}
.ht{width:100%;border-collapse:collapse;font-size:12px}
.ht th{text-align:left;color:var(--t3);font-weight:600;font-size:11px;padding:6px 8px;border-bottom:1px solid var(--bd)}
.ht td{padding:8px;border-bottom:1px solid #f9fafb;vertical-align:middle}
.ht tr:last-child td{border-bottom:none}
.view{display:none}.view.on{display:block}
.s{margin-bottom:24px}
.bk{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--t2);background:none;border:none;cursor:pointer;padding:4px 0;margin-bottom:16px;font-family:inherit}
.bk:hover{color:var(--pr)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:10px}

</head>

function hh(a,b){if(!a||!b)return 0;var p=a.split(':'),q=b.split(':');return((+q[0]*60+ +q[1])-(+p[0]*60+ +p[1]))/60;}
function hSem(hor){
var t=0;
['lunes','martes','miercoles','jueves','viernes','sabado'].forEach(function(d){
if(hor[d]&&hor[d].on){t+=hh(hor[d].i,hor[d].f);if(hor[d].i2&&hor[d].f2)t+=hh(hor[d].i2,hor[d].f2);}
});
return Math.round(t*100)/100;
}
function hDia(fecha,hor){
var ds=new Date(fecha+'T12:00:00').getDay();
var map=['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
var d=map[ds];if(!hor||!hor[d]||!hor[d].on)return 0;
var t=hh(hor[d].i,hor[d].f);if(hor[d].i2&&hor[d].f2)t+=hh(hor[d].i2,hor[d].f2);return t;
}
function horEn(eid,fecha){
return ST.hors.filter(function(h){return h.eid===eid;})
.sort(function(a,b){return b.ini>a.ini?1:-1;})
.find(function(h){return fecha>=h.ini&&fecha<=(h.fin||'2099-12-31');})||null;
}
function getFest(anio){
var base=(FB[anio]||[]).map(function(x,i){return{id:'p'+i,f:x.f,d:x.d,a:x.a,md:x.md};});
var bMap={};base.forEach(function(x){bMap[x.f]=true;});
var man=ST.fman.filter(function(x){return x.f.startsWith(''+anio)&&!bMap[x.f];});
return base.concat(man);
}
function calcSt(emp,anio){
var conv=ST.conv[anio]||{h:1786,v:25,a:3};
var evs=ST.evs.filter(function(e){return e.eid===emp.id&&(e.ini.startsWith(''+anio)||e.fin.startsWith(''+anio));});
var fest=getFest(anio);
var alta=emp.alta?new Date(emp.alta+'T12:00:00'):null;
var hC=emp.horas||conv.h,hT=hC;
if(alta&&alta.getFullYear()===anio){var di=Math.round((new Date(anio,11,31)-alta)/864e5)+1;hT=Math.round(hC*(di/365)*100)/100;}
var hTot=0,hV=0,hF=0,hFal=0,hExt=0,hSab=0,nSab=0;
for(var m=0;m<12;m++){
var dm=new Date(anio,m+1,0).getDate();
for(var dia=1;dia<=dm;dia++){
var fe=anio+'-'+pad(m+1)+'-'+pad(dia);
if(alta&&alta.getFullYear()===anio&&fe<emp.alta)continue;
var ds=new Date(fe+'T12:00:00').getDay();
if(ds===0)continue;
var hor=horEn(emp.id,fe);if(!hor)continue;
var hd=hDia(fe,hor);hTot+=hd;
if(ds===6){nSab++;hSab+=hd;}
var ev=evs.find(function(e){return fe>=e.ini&&fe<=e.fin;});
var fv=fest.find(function(x){return x.f===fe;});
if(ev){
if(ev.tipo==='VACACIONES'||ev.tipo==='ASUNTOS_PROPIOS'||ev.tipo==='SABADO_LIBRE')hV+=hd;
else if(ev.tipo==='FALTA_HORAS')hFal+=(ev.h||0);
else if(ev.tipo==='HORAS_EXTRA')hExt+=(ev.h||0);
}else if(fv){hF+=fv.md?hd-4.5:hd;}
}
}
var hR=hTot-hV-hF-hFal+hExt,saldo=Math.round((hR-hT)*100)/100;
var vU=evs.filter(function(e){return e.tipo==='VACACIONES';}).reduce(function(s,e){return s+Math.round((new Date(e.fin+'T12:00:00')-new Date(e.ini+'T12:00:00'))/864e5)+1;},0);
var vT=conv.v;if(alta&&alta.getFullYear()===anio){var d2=Math.round((new Date(anio,11,31)-alta)/864e5)+1;vT=Math.round(conv.v*(d2/365));}
var aU=evs.filter(function(e){return e.tipo==='ASUNTOS_PROPIOS';}).reduce(function(s,e){return s+Math.round((new Date(e.fin+'T12:00:00')-new Date(e.ini+'T12:00:00'))/864e5)+1;},0);
var aT=conv.a;if(alta&&alta.getFullYear()===anio){var d3=Math.round((new Date(anio,11,31)-alta)/864e5)+1;aT=Math.round(conv.a*(d3/365));}
var hpp=nSab>0?hSab/nSab:3.75,sabX=saldo>0&&hpp>0?Math.floor(saldo/hpp):0;
var sabU=evs.filter(function(e){return e.tipo==='SABADO_LIBRE';}).reduce(function(s,e){
var c=0,dd=new Date(e.ini+'T12:00:00'),fe2=new Date(e.fin+'T12:00:00');
for(;dd<=fe2;dd.setDate(dd.getDate()+1))if(dd.getDay()===6)c++;return s+c;
},0);
return{emp:emp,h:{teo:hT,real:Math.round(hR*100)/100,saldo:saldo},v:{t:vT,u:vU,d:vT-vU},a:{t:aT,u:aU,d:aT-aU},s:{x:sabX,u:sabU,d:Math.max(0,sabX-sabU)}};
}
function allSt(){
var ac=ST.emps.filter(function(e){return e.activo;});
return{total:ac.length,list:ac.map(function(e){return calcSt(e,ST.anio);})};
}
